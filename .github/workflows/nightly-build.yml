name: Nightly Windows Build
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'  # 12:00 AM UTC daily

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.compare.outputs.should_build }}
      upstream_version: ${{ steps.compare.outputs.upstream_version }}
    steps:
      - name: Check upstream for new release
        id: compare
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Get latest release from upstream
          LATEST=$(gh release view --repo superset-sh/superset --json tagName -q .tagName 2>/dev/null || echo "")
          if [ -z "$LATEST" ]; then
            echo "No upstream release found"
            echo "should_build=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "upstream_version=$LATEST" >> $GITHUB_OUTPUT

          # Check if we already have this version
          if gh release view "$LATEST" --repo ${{ github.repository }} &>/dev/null; then
            echo "Already built $LATEST"
            echo "should_build=false" >> $GITHUB_OUTPUT
          else
            echo "New version found: $LATEST"
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi

  build:
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: windows-latest
    steps:
      - name: Checkout patches repo
        uses: actions/checkout@v5

      - name: Clone upstream Superset
        shell: bash
        run: |
          git config --global core.longpaths true
          git clone --depth 1 --branch ${{ needs.check.outputs.upstream_version }} https://github.com/superset-sh/superset.git superset

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Apply Windows patches
        working-directory: superset
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
          ANTHROPIC_DEFAULT_SONNET_MODEL: ${{ secrets.ANTHROPIC_DEFAULT_SONNET_MODEL }}
          ANTHROPIC_SMALL_FAST_MODEL: ${{ secrets.ANTHROPIC_SMALL_FAST_MODEL }}
          ANTHROPIC_DEFAULT_HAIKU_MODEL: ${{ secrets.ANTHROPIC_DEFAULT_HAIKU_MODEL }}
          DISABLE_NON_ESSENTIAL_MODEL_CALLS: '1'
          CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: '1'
        shell: bash
        run: |
          PATCHES_CONTENT=$(cat ../PATCHES.md)
          claude --dangerously-skip-permissions --effort medium --verbose \
            --output-format stream-json --include-partial-messages \
            -p "IMPORTANT: Do NOT enter plan mode. Do NOT use EnterPlanMode. Apply all changes directly and immediately.

          You are inside a fresh clone of superset-sh/superset. Apply ALL the patches described below to the codebase. Read each target file before editing. Create new files where specified. Do not skip any patch.

          $PATCHES_CONTENT" 2>&1 | jq -rj '
            if .type == "stream_event" then
              if .event.delta.type? == "text_delta" then .event.delta.text
              elif .event.type? == "tool_use" then "\n🔧 " + (.event.name // "tool") + ": " + ((.event.input // {}) | tostring) + "\n"
              elif .event.type? == "tool_result" then ""
              else empty
              end
            else empty
            end
          '

      - name: Install dependencies
        working-directory: superset
        shell: bash
        run: bun install

      - name: Generate file icons
        working-directory: superset/apps/desktop
        shell: bash
        run: bun run generate:icons

      - name: Build app
        working-directory: superset/apps/desktop
        shell: bash
        run: bun run compile:app

      - name: Prepare native modules
        working-directory: superset/apps/desktop
        shell: bash
        run: bun run copy:native-modules

      - name: Build Windows installer
        working-directory: superset/apps/desktop
        shell: bash
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npx electron-builder --win --publish never --config electron-builder.ts

      - name: Archive patched source
        shell: bash
        run: tar -czf superset-patched-source.tar.gz --exclude='node_modules' --exclude='.bun' --exclude='dist' --exclude='release' superset/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          VERSION="${{ needs.check.outputs.upstream_version }}"
          gh release create "$VERSION" \
            superset/apps/desktop/release/Superset-*-x64.exe \
            superset-patched-source.tar.gz \
            --repo ${{ github.repository }} \
            --title "Superset $VERSION (Windows)" \
            --notes "Automated Windows build of [superset-sh/superset](https://github.com/superset-sh/superset) $VERSION.

          Built with Windows compatibility patches applied via AI agent.
          See [PATCHES.md](https://github.com/${{ github.repository }}/blob/main/PATCHES.md) for details.

          **Assets:**
          - \`Superset-$VERSION-x64.exe\` — Windows installer
          - \`superset-patched-source.tar.gz\` — Modified source code (for reviewing AI changes)"
